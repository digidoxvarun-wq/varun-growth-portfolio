name: Activate completed hero section

on:
  push:
    paths:
      - ".github/workflows/activate-hero-complete.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  activate-hero:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Load completed hero enhancement
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("index.html")
          html = path.read_text(encoding="utf-8")
          script = '  <script src="hero-complete.js"></script>\n'

          if 'src="hero-complete.js"' not in html:
              html = html.replace("</body>", script + "</body>")
              path.write_text(html, encoding="utf-8")
          PY

      - name: Commit activation
        shell: bash
        run: |
          if git diff --quiet; then
            echo "Hero enhancement is already active."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Load completed hero section [skip ci]"
          git push
