name: Repair hero portrait asset

on:
  push:
    paths:
      - ".github/workflows/repair-hero-portrait.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair-portrait:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Repair embedded portrait and reconnect hero
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          svg_path = Path("assets/images/varun_hero_photo.svg")
          svg = svg_path.read_text(encoding="utf-8")

          # The embedded raster image had no rendered dimensions, producing a blank SVG.
          if '<image href=' in svg and '<image width=' not in svg:
              svg = svg.replace(
                  '<image href=',
                  '<image x="0" y="0" width="900" height="1125" preserveAspectRatio="xMidYMid slice" href=',
                  1,
              )
              svg_path.write_text(svg, encoding="utf-8")

          js_path = Path("hero-complete.js")
          js = js_path.read_text(encoding="utf-8")
          anchor = '  heroPhoto.alt = "Varun Kumar working on performance marketing and digital growth strategy";'
          source_line = '  heroPhoto.src = "assets/images/varun_hero_photo.svg?v=2";\n'
          if source_line.strip() not in js:
              js = js.replace(anchor, source_line + anchor, 1)

          # Ensure the repaired portrait fills the panel without exposing broken-image text.
          js = js.replace('object-fit:contain;', 'object-fit:cover;')
          js = js.replace('object-position:center center;', 'object-position:center 36%;')
          js_path.write_text(js, encoding="utf-8")
          PY

      - name: Commit repaired portrait
        shell: bash
        run: |
          if git diff --quiet; then
            echo "Portrait asset is already repaired."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/images/varun_hero_photo.svg hero-complete.js
          git commit -m "Repair hero portrait rendering [skip ci]"
          git push
